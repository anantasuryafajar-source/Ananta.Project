name: Backup Database Harian

# Kapan backup jalan:
on:
  schedule:
    # Tiap hari 17:00 UTC = 00:00 WIB (tengah malam Indonesia Barat).
    - cron: "0 17 * * *"
  workflow_dispatch:   # tombol "Run workflow" untuk jalankan manual kapan saja

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode repo
        uses: actions/checkout@v4

      - name: Pasang PostgreSQL client (pg_dump v17)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Buat file backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          mkdir -p backups
          STAMP=$(date +%Y-%m-%d-%H%M)
          FILE="backups/ananta-${STAMP}.dump"
          # Panggil pg_dump v17 SECARA EKSPLISIT lewat path lengkap,
          # supaya tidak tertukar dengan pg_dump v16 bawaan sistem.
          PGDUMP="/usr/lib/postgresql/17/bin/pg_dump"
          echo "Versi pg_dump yang dipakai:"
          "${PGDUMP}" --version
          echo "Membuat backup: ${FILE}"
          "${PGDUMP}" "${DATABASE_URL}" -Fc -f "${FILE}"
          ls -lh "${FILE}"
          echo "STAMP=${STAMP}" >> "$GITHUB_ENV"

      - name: Unggah backup sebagai artifact (tersimpan 30 hari)
        uses: actions/upload-artifact@v4
        with:
          name: ananta-backup-${{ env.STAMP }}
          path: backups/*.dump
          retention-days: 30
