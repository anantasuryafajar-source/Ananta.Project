name: CI - Uji Backend (pytest)

# Kapan CI jalan:
# - tiap push ke main yang menyentuh backend
# - tiap pull request yang menyentuh backend
# - manual lewat tombol "Run workflow"
#
# Test pakai SQLite in-memory (aiosqlite), JADI TIDAK butuh Postgres.
# Tujuan utama: menjaga invarian jurnal (debit = kredit) agar tidak
# pernah bobol masuk ke produksi tanpa ketahuan.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch: # tombol jalankan manual kapan saja

jobs:
  test:
    name: pytest (SQLite in-memory)
    runs-on: ubuntu-latest

    # Semua langkah 'run' dijalankan dari folder backend,
    # supaya paket 'app' bisa di-import oleh test (lihat conftest.py).
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Ambil kode repo
        uses: actions/checkout@v4

      - name: Pasang Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pasang uv (installer cepat)
        run: pip install --no-cache-dir uv

      - name: Pasang dependency produksi (dari pyproject [project])
        # Sama persis dengan cara Dockerfile produksi meng-install —
        # kalau langkah ini gagal, berarti ada paket produksi yang hilang
        # (ini juga bikin "Jebakan 1" ketahuan lebih awal, sebelum deploy).
        run: uv pip install --system -r pyproject.toml

      - name: Pasang tooling test (grup dev)
        # Grup dev TIDAK ikut di produksi; hanya untuk menjalankan test di CI.
        run: uv pip install --system pytest pytest-asyncio aiosqlite

      - name: Jalankan test
        run: pytest -v
